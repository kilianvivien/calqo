<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200"><rect width="320" height="200" fill="#F7F3EA"/><rect width="320" height="36" fill="#6E1423"/><text x="20" y="23" fill="#F2D8AE" font-family="Arial" font-size="9" font-weight="700" letter-spacing="1.5">PRESS RELEASE · COMMUNIQUÉ</text><text x="300" y="23" fill="#E5B8B0" font-family="Arial" font-size="9" text-anchor="end">15 JULY 2026</text><text x="20" y="72" fill="#1C2B3A" font-family="Georgia" font-size="19" font-weight="700">Examplia and Türkiye sign new</text><text x="20" y="94" fill="#1C2B3A" font-family="Georgia" font-size="19" font-weight="700">agreement on academic mobility</text><rect x="20" y="112" width="2.5" height="38" fill="#6E1423"/><text x="30" y="126" fill="#4A4438" font-family="Georgia" font-size="10" font-style="italic">“This agreement opens the door to a new</text><text x="30" y="142" fill="#4A4438" font-family="Georgia" font-size="10" font-style="italic">generation of exchanges between our universities.”</text><rect x="20" y="164" width="280" height="1" fill="#D8CFBB"/><text x="20" y="184" fill="#8A8578" font-family="Arial" font-size="8.5">Press contact — press@mfa.examplia.example</text></svg>
