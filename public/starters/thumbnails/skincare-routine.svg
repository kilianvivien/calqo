<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 133 200"><rect width="133" height="200" fill="#F7F2EE"/><ellipse cx="126" cy="20" rx="25" ry="45" transform="rotate(35 126 20)" fill="#5D735D"/><circle cx="5" cy="188" r="35" fill="#D99A8B"/><text x="10" y="20" fill="#D07D6B" font-family="Arial" font-size="4.5" font-weight="700" letter-spacing="1">SUNDAY SELF-CARE</text><text x="9" y="50" fill="#2F3E35" font-family="Georgia" font-size="14" font-weight="700">A simple</text><text x="9" y="67" fill="#2F3E35" font-family="Georgia" font-size="14" font-weight="700">evening reset</text><text x="11" y="100" fill="#2F3E35" font-family="Arial" font-size="6" font-weight="700">01  CLEANSE</text><text x="20" y="109" fill="#2F3E35" font-family="Arial" font-size="4.5">Melt away the day</text><text x="11" y="130" fill="#2F3E35" font-family="Arial" font-size="6" font-weight="700">02  TREAT</text><text x="20" y="139" fill="#2F3E35" font-family="Arial" font-size="4.5">Three drops, gently pressed</text><text x="11" y="160" fill="#2F3E35" font-family="Arial" font-size="6" font-weight="700">03  SEAL</text><text x="20" y="169" fill="#2F3E35" font-family="Arial" font-size="4.5">Moisture and a quiet minute</text></svg>
