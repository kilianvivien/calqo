<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200"><rect width="160" height="200" fill="#F4D35E"/><rect x="8" y="8" width="144" height="184" rx="6" fill="#FAF7EF"/><rect x="8" y="127" width="144" height="65" fill="#62C3B4"/><circle cx="128" cy="129" r="27" fill="#EE6C4D"/><rect x="119" y="18" width="23" height="30" transform="rotate(5 130 33)" fill="#F4D35E" stroke="#17324D"/><text x="18" y="31" fill="#EE6C4D" font-family="Arial" font-size="5.5" font-weight="700" letter-spacing="1">A LITTLE NOTE FROM</text><text x="17" y="70" fill="#17324D" font-family="Georgia" font-size="20" font-weight="700" font-style="italic">Somewhere</text><text x="17" y="92" fill="#17324D" font-family="Georgia" font-size="20" font-weight="700" font-style="italic">wonderful</text><text x="18" y="157" fill="#17324D" font-family="Arial" font-size="6.5" font-weight="700">Wish you were here.</text><text x="18" y="168" fill="#17324D" font-family="Arial" font-size="6.5">The days are slow and the sea is warm.</text></svg>
