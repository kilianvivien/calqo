<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="256x256" href="/calqo-icon.png" />
    <link rel="apple-touch-icon" href="/calqo-icon@2x.png" />
    <link rel="apple-touch-icon" sizes="256x256" href="/calqo-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#e9ebf0" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#15161c" media="(prefers-color-scheme: dark)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Calqo" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:ital,wght@0,400;0,600;0,700;1,400&family=Barlow:ital,wght@0,400;0,600;0,700;1,400&family=Bebas+Neue&family=Caveat:wght@400;700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Manrope:wght@400;600;700;800&family=Merriweather:ital,wght@0,400;0,700;1,400&family=Montserrat:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Nunito:ital,wght@0,400;0,600;0,700;1,400&family=Oswald:wght@400;600;700&family=Pacifico&family=Permanent+Marker&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Raleway:ital,wght@0,400;0,600;0,700;1,400&family=Roboto:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:ital,wght@0,400;0,600;0,700;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,700;1,8..60,400&family=Space+Grotesk:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Calqo Web</title>
    <meta
      name="description"
      content="Calqo — an open-source, simple, glass-native social visual maker."
    />
  </head>
  <body>
    <div id="root"></div>
    <!-- TEMP diagnostic: surface boot failures on-device (iOS Safari shows a blank
         white page on an uncaught module/syntax error with no visible console).
         If the app mounts normally this never renders. Remove once iOS boot is
         confirmed healthy. -->
    <script>
      (function () {
        function show(msg) {
          var el = document.getElementById('boot-error');
          if (!el) {
            el = document.createElement('pre');
            el.id = 'boot-error';
            el.style.cssText =
              'position:fixed;inset:0;z-index:99999;margin:0;padding:16px;white-space:pre-wrap;word-break:break-word;font:12px/1.5 ui-monospace,monospace;background:#15161c;color:#ff7a7a;overflow:auto;';
            (document.body || document.documentElement).appendChild(el);
          }
          el.textContent += msg + '\n\n';
        }
        window.addEventListener('error', function (e) {
          show(
            'Error: ' +
              (e.message || (e.error && e.error.message) || e.error || 'unknown') +
              (e.filename ? '\n@ ' + e.filename + ':' + e.lineno + ':' + e.colno : ''),
          );
        });
        window.addEventListener('unhandledrejection', function (e) {
          var r = e.reason;
          show('Unhandled rejection: ' + ((r && (r.stack || r.message)) || r));
        });
        window.addEventListener('load', function () {
          setTimeout(function () {
            var root = document.getElementById('root');
            if (root && root.childElementCount === 0 && !document.getElementById('boot-error')) {
              show(
                'App did not mount within 6s and root is empty. No error was caught, so the JS bundle likely failed to load/execute (network, MIME, or a stale service worker).',
              );
            }
          }, 6000);
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
